
services:

  db:
    image: postgres:15
    container_name: sentinelstream_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sentinelstream_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: sentinelstream_api
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: sentinelstream_celery
    restart: always
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
    command: celery -A worker.celery_worker.celery_app worker --loglevel=info

volumes:
  postgres_data:
